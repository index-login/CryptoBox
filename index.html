<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoBox - 加解密工具箱</title>
    <meta name="description" content="纯前端加解密工具集合，支持 AES/DES/3DES/SM2/SM3/SM4/RSA 等加解密，Base64/URL/Hex 编解码，MD5/SHA 哈希计算。所有数据本地处理，安全可靠。">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: {
                            900: '#0d1117',
                            800: '#161b22',
                            700: '#1c2128',
                            600: '#21262d',
                            500: '#30363d',
                        },
                        accent: {
                            DEFAULT: '#00d2d3',
                            dark: '#0f3460',
                        }
                    }
                }
            }
        }
    </script>
    <!-- CryptoJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <!-- SM 国密系列 -->
    <script src="https://cdn.jsdelivr.net/npm/sm-crypto@0.3.13/dist/sm4.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sm-crypto@0.3.13/dist/sm3.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sm-crypto@0.3.13/dist/sm2.js"></script>
    <!-- RSA -->
    <script src="https://cdn.jsdelivr.net/npm/jsencrypt@3.3.2/bin/jsencrypt.min.js"></script>
    <!-- Pako (Gzip) -->
    <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark-900 text-gray-200 h-screen flex flex-col overflow-hidden">
    <!-- Top Navigation -->
    <header class="bg-dark-800 border-b border-dark-500 px-4 py-3 flex items-center justify-between flex-shrink-0">
        <div class="flex items-center gap-3">
            <button id="sidebar-toggle" class="lg:hidden p-1 rounded hover:bg-dark-600 transition-colors" aria-label="切换侧边栏">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>
            <h1 class="text-xl font-bold text-accent">CryptoBox</h1>
            <span class="text-xs text-gray-500 hidden sm:inline">加解密工具箱</span>
        </div>
        <div class="flex items-center gap-3">
            <!-- Global search -->
            <div class="relative hidden sm:block">
                <input type="text" id="global-search" placeholder="搜索工具... (Ctrl+K)" 
                    class="bg-dark-700 border border-dark-500 rounded-lg px-3 py-1.5 text-sm w-48 focus:w-64 transition-all focus:outline-none focus:border-accent placeholder-gray-500">
                <svg class="w-4 h-4 absolute right-3 top-1/2 -translate-y-1/2 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
            </div>
            <a href="https://github.com" target="_blank" rel="noopener" class="text-gray-400 hover:text-white transition-colors" aria-label="GitHub">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                </svg>
            </a>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <aside id="sidebar" class="w-64 bg-dark-800 border-r border-dark-500 flex-shrink-0 overflow-y-auto hidden lg:block">
            <!-- Sidebar search (mobile) -->
            <div class="p-3 sm:hidden">
                <input type="text" id="sidebar-search" placeholder="搜索工具..."
                    class="w-full bg-dark-700 border border-dark-500 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:border-accent placeholder-gray-500">
            </div>
            <!-- Tool categories -->
            <nav id="tool-nav" class="p-2">
                <!-- Categories will be rendered by JS -->
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto p-4 lg:p-6">
            <!-- Welcome page (shown when no tool is selected) -->
            <div id="welcome-page">
                <div class="max-w-3xl mx-auto text-center py-16">
                    <h2 class="text-3xl font-bold text-accent mb-4">CryptoBox</h2>
                    <p class="text-gray-400 mb-8">纯前端加解密工具箱，所有数据本地处理，安全可靠</p>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm">
                        <div class="bg-dark-800 rounded-lg p-4 border border-dark-500">
                            <div class="text-2xl mb-2">🔤</div>
                            <div class="text-gray-300">编码/解码</div>
                        </div>
                        <div class="bg-dark-800 rounded-lg p-4 border border-dark-500">
                            <div class="text-2xl mb-2">🔐</div>
                            <div class="text-gray-300">加密/解密</div>
                        </div>
                        <div class="bg-dark-800 rounded-lg p-4 border border-dark-500">
                            <div class="text-2xl mb-2">#️⃣</div>
                            <div class="text-gray-300">哈希计算</div>
                        </div>
                        <div class="bg-dark-800 rounded-lg p-4 border border-dark-500">
                            <div class="text-2xl mb-2">🛠️</div>
                            <div class="text-gray-300">实用工具</div>
                        </div>
                    </div>
                    <div class="mt-8 text-xs text-gray-600">
                        <p>快捷键：Ctrl+K 搜索 | Ctrl+Enter 执行 | Ctrl+L 清空</p>
                    </div>
                </div>
            </div>

            <!-- Tool workspace (shown when a tool is selected) -->
            <div id="tool-workspace" class="hidden max-w-4xl mx-auto">
                <!-- Tool header -->
                <div class="flex items-center justify-between mb-4">
                    <h2 id="tool-title" class="text-xl font-bold"></h2>
                    <div class="flex items-center gap-2">
                        <label class="flex items-center gap-1.5 text-xs text-gray-400 cursor-pointer">
                            <input type="checkbox" id="auto-preprocess" class="rounded bg-dark-700 border-dark-500 text-accent focus:ring-accent">
                            <span>智能预处理</span>
                        </label>
                        <label class="flex items-center gap-1.5 text-xs text-gray-400 cursor-pointer">
                            <input type="checkbox" id="batch-mode" class="rounded bg-dark-700 border-dark-500 text-accent focus:ring-accent">
                            <span>批量模式</span>
                        </label>
                    </div>
                </div>

                <!-- Input area -->
                <div class="mb-4">
                    <div class="flex items-center justify-between mb-1.5">
                        <label class="text-sm text-gray-400">输入</label>
                        <div class="flex items-center gap-2">
                            <select id="input-format" class="bg-dark-700 border border-dark-500 rounded text-xs px-2 py-1 focus:outline-none focus:border-accent">
                                <option value="utf8">UTF-8</option>
                                <option value="hex">Hex</option>
                                <option value="base64">Base64</option>
                                <option value="binary">Binary</option>
                            </select>
                            <button id="btn-clear-input" class="text-xs text-gray-500 hover:text-gray-300 transition-colors" title="清空输入">清空</button>
                        </div>
                    </div>
                    <textarea id="input-text" rows="6" placeholder="在此输入内容..."
                        class="w-full bg-dark-700 border border-dark-500 rounded-lg px-4 py-3 text-sm font-mono resize-y focus:outline-none focus:border-accent placeholder-gray-600"
                        spellcheck="false"></textarea>
                </div>

                <!-- Tool-specific options (dynamically rendered) -->
                <div id="tool-options" class="mb-4 bg-dark-800 rounded-lg border border-dark-500 p-4 hidden">
                    <!-- Options rendered by each tool -->
                </div>

                <!-- Action buttons -->
                <div class="flex items-center gap-3 mb-4">
                    <button id="btn-execute" class="bg-accent hover:bg-accent/80 text-dark-900 font-semibold px-5 py-2 rounded-lg transition-colors text-sm">
                        执行 <span class="text-xs opacity-70">(Ctrl+Enter)</span>
                    </button>
                    <button id="btn-swap" class="bg-dark-600 hover:bg-dark-500 px-3 py-2 rounded-lg transition-colors text-sm" title="交换输入输出">
                        ⇅ 交换
                    </button>
                    <button id="btn-clear-all" class="bg-dark-600 hover:bg-dark-500 px-3 py-2 rounded-lg transition-colors text-sm" title="清空所有 (Ctrl+L)">
                        清空全部
                    </button>
                </div>

                <!-- Output area -->
                <div>
                    <div class="flex items-center justify-between mb-1.5">
                        <label class="text-sm text-gray-400">输出</label>
                        <div class="flex items-center gap-2">
                            <select id="output-format" class="bg-dark-700 border border-dark-500 rounded text-xs px-2 py-1 focus:outline-none focus:border-accent">
                                <option value="utf8">UTF-8</option>
                                <option value="hex">Hex</option>
                                <option value="base64">Base64</option>
                            </select>
                            <button id="btn-copy" class="text-xs text-gray-500 hover:text-accent transition-colors" title="复制结果">复制</button>
                        </div>
                    </div>
                    <textarea id="output-text" rows="6" readonly
                        class="w-full bg-dark-700 border border-dark-500 rounded-lg px-4 py-3 text-sm font-mono resize-y focus:outline-none placeholder-gray-600"
                        spellcheck="false"></textarea>
                    <!-- Error/info message -->
                    <div id="output-message" class="mt-2 text-xs hidden"></div>
                </div>
            </div>
        </main>

        <!-- Right Panel: History -->
        <aside id="history-panel" class="w-72 bg-dark-800 border-l border-dark-500 flex-shrink-0 overflow-hidden hidden lg:flex flex-col transition-all duration-200">
            <!-- History header -->
            <div class="flex items-center justify-between px-3 py-2.5 border-b border-dark-500">
                <span class="text-xs font-semibold text-gray-400 uppercase tracking-wide">历史记录</span>
                <button id="btn-clear-history" class="text-xs text-gray-500 hover:text-red-400 transition-colors" title="清空历史">清空</button>
            </div>
            <!-- History list -->
            <div id="history-list" class="flex-1 overflow-y-auto p-2 space-y-2">
                <!-- History items rendered by JS -->
                <div class="text-center text-xs text-gray-600 py-8">暂无历史记录</div>
            </div>
        </aside>

        <!-- History toggle button (when panel is hidden) -->
        <button id="history-toggle" class="fixed right-0 top-1/2 -translate-y-1/2 bg-dark-700 border border-dark-500 border-r-0 rounded-l-lg px-1.5 py-3 text-gray-400 hover:text-accent hover:bg-dark-600 transition-colors z-20" title="历史记录 (Ctrl+H)">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
        </button>
    </div>

    <!-- Toast notification -->
    <div id="toast" class="fixed bottom-4 right-4 bg-dark-600 border border-dark-500 rounded-lg px-4 py-2 text-sm shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 pointer-events-none z-50"></div>

    <!-- Scripts -->
    <script src="js/core/format.js"></script>
    <script src="js/core/preprocessor.js"></script>
    <script src="js/core/history.js"></script>
    <script src="js/lib/encoding.js"></script>
    <script src="js/lib/hash.js"></script>
    <script src="js/lib/cipher.js"></script>
    <script src="js/lib/classical.js"></script>
    <script src="js/lib/sm2.js"></script>
    <script src="js/lib/rsa.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
